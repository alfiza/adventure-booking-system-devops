services:
  backend:
    image: booking-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=local
    networks:
      - booking-network
    depends_on:
      - mongo

  frontend:
    image: booking-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booking-frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - booking-network

  mongo:
    image: mongo:7
    container_name: booking-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGODB_DB_NAME}
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - booking-network

networks:
  booking-network:
    driver: bridge

volumes:
  mongo-data: