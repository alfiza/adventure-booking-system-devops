services:
  backend:
    build: ./backend
    container_name: booking-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
    
      - booking-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: booking-frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - booking-network

networks:
  booking-network:
    driver: bridge

