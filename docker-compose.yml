# Explicit version so `build: { context, ... }` validates (Compose file v1 only allows `build: path`).
#
# Windows + OneDrive: plain "docker-compose" in PowerShell uses Docker from PATH (BuildKit ON) → fails.
# Fix ONE of:  BUILDKIT-OFF.txt  |  docker-build-tar.cmd then compose up --no-build  |  .\dc.ps1


services:
  backend:
    image: booking-backend:local
    # Repo-root context + Dockerfile
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=dev
      - MONGODB_URL=mongodb://appuser:apppassword@mongo:27017/booking_system?authSource=booking_system
      - MONGODB_DB_NAME=booking_system
      - SECRET_KEY=change-this-in-prod
    networks:
      - booking-network
    depends_on:
      - mongo

  frontend:
    image: booking-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: booking-frontend
    ports:
      - "3000:5173"
    environment:
      # Browser calls API on host (published port 8000). Override if needed.
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - booking-network

  mongo:
    image: mongo:7
    container_name: booking-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_INITDB_DATABASE=booking_system
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - booking-network

networks:
  booking-network:
    driver: bridge

volumes:
  mongo-data:
